map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name localhost;

    # Quitamos limite de tamaño ya que esto es un gestor de archivos y estaba teniendo problemas
    client_max_body_size 0;

    location / {
        proxy_pass http://frontend:5173;
        
        # Configuración de WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    
        # proxy_read_timeout 86400s;
        # proxy_send_timeout 86400s;
        # proxy_buffering off;
        # proxy_cache_bypass $http_upgrade;
    }

    location ~ ^/(api|admin|static_backend|media) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeouts amplios para subidas de archivos grandes
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;

        # Deshabilitar buffering para que los datos fluyan directamente a Django/S3
        proxy_request_buffering off;
    }

    location /static_backend/ {
       alias /app/staticfiles/;
    }
}
