map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# -------------------------------------------------------
# Puerto 3900: proxy CORS para presigned PUTs a Garage S3
# SSL habilitado para que el navegador pueda hacer PUT
# sobre HTTPS sin mixed-content warnings.
# -------------------------------------------------------
server {
    listen 3900 ssl;
    server_name pomba.app;

    ssl_certificate     /etc/letsencrypt/live/pomba.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pomba.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 0;

    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, PUT, HEAD, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, x-amz-content-sha256, x-amz-date, x-amz-security-token' always;
            add_header 'Access-Control-Max-Age' 3600 always;
            add_header 'Content-Length' 0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin'  '$http_origin' always;
        add_header 'Access-Control-Allow-Methods' 'GET, PUT, HEAD, DELETE, OPTIONS' always;
        add_header 'Access-Control-Expose-Headers' 'ETag' always;

        proxy_pass http://garage:3900;
        # Host debe coincidir con lo que firmó SigV4 (host=pomba.app:3900)
        proxy_set_header Host $host:3900;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
    }
}

# -------------------------------------------------------
# Puerto 80: redirige todo a HTTPS
# -------------------------------------------------------
server {
    listen 80;
    server_name pomba.app www.pomba.app;
    return 301 https://pomba.app$request_uri;
}

# -------------------------------------------------------
# Puerto 443: app principal con SSL
# -------------------------------------------------------
server {
    listen 443 ssl;
    server_name pomba.app www.pomba.app;

    ssl_certificate     /etc/letsencrypt/live/pomba.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pomba.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 0;

    # API, admin y estáticos de Django → Gunicorn
    location ~ ^/(api|admin|static_backend) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Informa a Django que el usuario llegó por HTTPS (evita bucle con SECURE_SSL_REDIRECT)
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_request_buffering off;
    }

    location /static_backend/ {
        alias /app/staticfiles/;
    }

    # Todo lo demás → Vue SPA (nginx interno del contenedor frontend)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
