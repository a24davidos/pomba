services:

  # Backend Django
  backend:
    build:
      context: ..
      dockerfile: Docker/Dockerfile.backend
    container_name: django_backend
    env_file: .env
    environment:
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/admin/login/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - appnet

  # Frontend Vue 3 + Vite
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: vue_frontend
    env_file: .env
    volumes:
      - ../frontend/:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - appnet

  # PostgreSQL
  db:
    image: postgres:15
    container_name: postgres_db
    # Usamos el archivo de variables que definiste
    env_file: .env  
    environment:
      # Aunque env_file carga las variables, a veces es mejor 
      # asegurar las que usa la imagen oficial de Postgres
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Garage (S3 Storage)
  garage:
    image: dxflrs/garage:v0.8.2
    container_name: garage
    restart: unless-stopped
    env_file: .env
    environment:
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET}
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
      - ./garage.toml:/etc/garage.toml:ro
    ports:
      - "3900:3900"   # S3 API
      - "3901:3901"   # RPC 
      - "3903:3903"   # Admin API 
    networks:
      - appnet

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.1
    container_name: elasticsearch
    env_file: .env
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "${ES_PORT}:9200"
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.1
    container_name: kibana
    env_file: .env
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - appnet

networks:
  appnet:

volumes:
  postgres_data:
  es_data:
  garage_meta:
  garage_data: