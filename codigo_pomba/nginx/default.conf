map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

#  Garage S3 con CORS 
# Nginx escucha en :3900 (en lugar de Garage directamente) para poder inyectar las cabeceras CORS que permiten al navegador hacer PUT presignado directo.
server {
    listen 3900;
    server_name localhost;

    client_max_body_size 0;

    # Preflight CORS
    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, PUT, HEAD, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, x-amz-content-sha256, x-amz-date, x-amz-security-token' always;
            add_header 'Access-Control-Max-Age' 3600 always;
            add_header 'Content-Length' 0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin'  '$http_origin' always;
        add_header 'Access-Control-Allow-Methods' 'GET, PUT, HEAD, DELETE, OPTIONS' always;
        add_header 'Access-Control-Expose-Headers' 'ETag, Accept-Ranges, Content-Range, Content-Length' always;

        proxy_pass http://garage:3900;
        proxy_set_header Host $host:3900;
        proxy_http_version 1.1;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
        proxy_buffering off;
    }
}

server {
    listen 80;
    server_name localhost;

    # Quitamos limite de tamaño ya que esto es un gestor de archivos y estaba teniendo problemas
    client_max_body_size 0;

    location / {
        proxy_pass http://frontend:5173;
        
        # Configuración de WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    
        # proxy_read_timeout 86400s;
        # proxy_send_timeout 86400s;
        # proxy_buffering off;
        # proxy_cache_bypass $http_upgrade;
    }

    location ~ ^/(api|admin|static_backend|media) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeouts amplios para subidas de archivos grandes
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;

        # Deshabilitar buffering para que los datos fluyan directamente a Django/S3
        proxy_request_buffering off;
    }

    location /static_backend/ {
       alias /app/staticfiles/;
    }
}
